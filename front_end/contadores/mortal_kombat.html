<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contador Mortal Kombat</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #07050f;
    --bg2: #0e0a1a;
    --purple: #a855f7;
    --purple-border: rgba(168,85,247,0.25);
    --purple-glow: rgba(168,85,247,0.08);
    --txt: #ede8ff;
    --txt2: #6b5f8a;
    --mono: 'Space Mono', monospace;
    --display: 'Syne', sans-serif;
  }
  body {
    background: var(--bg);
    color: var(--txt);
    font-family: var(--mono);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(168,85,247,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(168,85,247,0.04) 1px, transparent 1px);
    background-size: 44px 44px;
    pointer-events: none;
  }
  .orb {
    position: fixed;
    width: 500px; height: 500px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(124,58,237,0.15) 0%, transparent 70%);
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
  }
  .wrap {
    position: relative;
    z-index: 1;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1rem;
  }
  .label {
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--purple);
  }
  .title {
    font-family: var(--display);
    font-size: 2.2rem;
    font-weight: 800;
    letter-spacing: -0.02em;
    color: var(--txt);
  }
  .badge {
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 5px 14px;
    border: 1px solid var(--purple-border);
    color: var(--txt2);
    border-radius: 2px;
    margin-top: 0.5rem;
  }
  .back {
    margin-top: 2rem;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 0.6rem 1.2rem;
    border: 1px solid var(--purple-border);
    color: var(--txt2);
    text-decoration: none;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    border-radius: 2px;
    transition: all 0.2s;
  }
  .back:hover { border-color: var(--purple); color: var(--purple); }
</style>
</head>
<body>
<div class="orb"></div>
<div class="wrap">
  <p class="label">// contadores</p>
  <h1 class="title">Contador Mortal Kombat</h1>
  <div class="badge">en construcción</div>
  <a href="../main/index.html" class="back">← volver al inicio</a>
</div>
</body>
</html>
